# ============================================================================
# QA config (dev + qa)
# - Used by: python main.py qa --config config/config_qa.yaml
# - Scope: qa/dev only (no sim section in this file)
# - Profile: short smoke run (covers all conditions with reduced trial count)
# ============================================================================

# === Subject Form ===========================================================
subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3
  - name: subname
    type: string
  - name: age
    type: int
    constraints:
      min: 5
      max: 60
  - name: gender
    type: choice
    choices:
      - Male
      - Female

# === Subject Mapping ========================================================
subinfo_mapping:
  subject_id: 被试号
  subname: 被试姓名(拼音)
  age: 年龄
  gender: 性别
  Male: 男
  Female: 女
  registration_failed: 注册失败。
  registration_successful: 注册成功！
  invalid_input: 字段 {field} 输入无效

# === Display / Window =======================================================
window:
  size:
    - 1920
    - 1080
  units: deg
  screen: 1
  bg_color: gray
  fullscreen: true
  monitor_width_cm: 60
  monitor_distance_cm: 72

# === Task ===================================================================
task:
  task_name: simon_task
  save_path: ./outputs/qa
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
  total_blocks: 1
  total_trials: 16
  trial_per_block: 16
  conditions:
    - red_left
    - red_right
    - blue_left
    - blue_right
  key_list:
    - f
    - j
  left_key: f
  right_key: j
  seed_mode: same_across_sub
  delta: 0.0

# === Stimuli ================================================================
stimuli:
  fixation:
    type: text
    text: "+"
    color: white
    height: 1.5

  red_left:
    type: circle
    radius: 1.5
    color: red
    pos: [-3, 0]

  red_right:
    type: circle
    radius: 1.5
    color: red
    pos: [3, 0]

  blue_left:
    type: circle
    radius: 1.5
    color: blue
    pos: [-3, 0]

  blue_right:
    type: circle
    radius: 1.5
    color: blue
    pos: [3, 0]

  correct_feedback:
    type: text
    text: 正确
    color: white
    font: SimHei
    height: 1.5

  incorrect_feedback:
    type: text
    text: 错误
    color: white
    font: SimHei
    height: 1.5

  no_response_feedback:
    type: text
    text: 未反应
    color: white
    font: SimHei
    height: 1.5

  block_break:
    type: text
    text: |
      QA模式：第 {block_num} / {total_blocks} 部分完成
      正确率：{accuracy:.2%}
      请按【空格键】继续
    color: white
    font: SimHei
    height: 1.2

  instruction_text:
    type: textbox
    text: |
      【Simon任务】

      QA模式：请根据颜色反应。
      红色按【f】，蓝色按【j】。

      请按【空格键】开始。
    color: white
    font: SimHei
    alignment: center
    letterHeight: 0.78
    units: deg
    size: [20, 5]

  good_bye:
    type: textbox
    text: |
      QA结束。
      请按【空格键】退出。
    color: white
    font: SimHei
    alignment: center
    letterHeight: 0.9
    units: deg
    size: [20, 5]

# === Timing =================================================================
timing:
  iti_duration:
    - 0.8
    - 1.2
  fixation_duration: 0.5
  stim_duration: 1.0
  feedback_duration: 0.5

# === Triggers ===============================================================
triggers:
  map:
    exp_onset: 98
    exp_end: 99
    block_onset: 100
    block_end: 101
    fixation_onset: 1
    stim_onset: 10
    left_key_press: 30
    right_key_press: 31
    feedback_correct_response: 51
    feedback_incorrect_response: 52
    feedback_no_response: 53
    feedback_onset: 60

  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
    timeout: 1
    prefix:
      - 1
      - 225
      - 1
      - 0

  policy:
    strict: false

  timing:
    post_delay_s: 0.001

# === QA Runtime =============================================================
qa:
  output_dir: outputs/qa
  enable_scaling: true
  timing_scale: 0.05
  min_frames: 1
  strict: false
  max_wait_s: 10.0
  acceptance_criteria:
    required_columns:
      - condition
      - stimulus_response
      - stimulus_hit
    expected_trial_count: 16
    allowed_keys:
      - f
      - j
    triggers_required: true
    trigger_codes_expected:
      - 1
      - 10
      - 30
      - 31
      - 51
      - 52
      - 53
      - 98
      - 99
      - 100
      - 101